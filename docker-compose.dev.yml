services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-kuizz
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_kuizz:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-kuizz
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    volumes:
      - redisinsight:/data
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  redisinsight:
  postgres_data_kuizz:
