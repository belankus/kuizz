services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-kuizz
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data_kuizz:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-kuizz
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    volumes:
      - redisinsight:/data
    ports:
      - "5540:5540"
    depends_on:
      - redis

  backend:
    image: node:22-alpine
    container_name: backend-kuizz
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:secret@postgres:5432/kuizz?schema=public
      - REDIS_HOST=redis
      - NODE_ENV=development
    ports:
      - "3001:3001"
    command: sh -c "corepack enable pnpm && pnpm install && pnpm --filter kuizz-backend prisma:generate && pnpm --filter kuizz-backend start:dev"
    depends_on:
      - postgres
      - redis

  prisma-studio:
    image: node:22-alpine
    container_name: prisma-studio-kuizz
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:secret@postgres:5432/kuizz?schema=public
    ports:
      - "51212:51212"
    command: sh -c "corepack enable pnpm && pnpm i && pnpm --filter kuizz-backend prisma:studio --port 51212 --browser none"
    depends_on:
      - postgres

  frontend:
    image: node:22-alpine
    container_name: frontend-kuizz
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001
      - NODE_ENV=development
    ports:
      - "3000:3000"
    command: sh -c "corepack enable pnpm && pnpm i && pnpm --filter kuizz-frontend dev"
    depends_on:
      - backend

volumes:
  redisinsight:
  postgres_data_kuizz:
  node_modules:
